<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 나의 리워드 패드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #F0F4F8; }
        .ticket-bounce { animation: bounce 1s infinite alternate; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .click-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body class="p-4 md:p-8 select-none">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm">
        <div>
            <h1 id="app-title-display" class="text-xl md:text-2xl font-extrabold text-blue-600">이준이의 해야 할 일</h1>
            <p id="current-date" class="text-sm text-gray-500 font-bold mt-1"></p>
        </div>
        <button onclick="toggleMode()" id="mode-btn" class="text-gray-300 hover:text-gray-500 font-bold p-2 text-xl transition bg-transparent border-none outline-none cursor-pointer">
            +
        </button>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div id="child-view" class="md:col-span-2 space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-md border border-blue-50">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span>📝 <span id="todo-date-label">오늘</span> 할 일</span>
                        <span id="task-count" class="bg-blue-100 text-blue-600 text-xs py-1 px-2.5 rounded-full font-bold">0개</span>
                    </div>
                    <button id="back-to-today-btn" onclick="goToToday()" class="text-xs bg-blue-500 text-white px-3 py-1.5 rounded-xl font-bold hidden transition hover:bg-blue-600">
                        오늘로 돌아가기 ↩️
                    </button>
                </h2>
                <div id="todo-list" class="space-y-3"></div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-gradient-to-br from-yellow-400 to-orange-400 p-6 rounded-3xl shadow-md text-white">
                <p class="text-sm font-bold opacity-90">현재 모은 포인트</p>
                <div class="flex items-baseline gap-1 mt-2">
                    <span id="current-points" class="text-4xl font-extrabold">0</span>
                    <span class="text-lg font-bold">P</span>
                </div>
                <div class="mt-4 bg-white/20 rounded-full h-3 overflow-hidden">
                    <div id="point-progress" class="bg-white h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-xs mt-2 opacity-80 text-right"><span id="next-ticket-p">100</span>P 달성 시 위시 티켓 획득!</p>
            </div>

            <div onclick="openTicketBoxModal()" class="click-pulse bg-white p-5 rounded-3xl shadow-md border-2 border-orange-200 text-center cursor-pointer hover:bg-orange-50/50 transition-all active:scale-95">
                <h3 class="text-gray-700 font-bold text-sm mb-3 text-left flex justify-between items-center">
                    <span>🎟️ 나의 위시 티켓함</span>
                    <span class="text-xs text-blue-500 font-bold animate-pulse">열기 🔍</span>
                </h3>
                <div class="flex justify-center items-center gap-4 bg-orange-100/70 p-3 rounded-2xl">
                    <span class="text-4xl">🎫</span>
                    <div class="text-left">
                        <p class="text-xs text-gray-500 font-bold">보유 중인 티켓</p>
                        <p class="text-2xl font-extrabold text-orange-500"><span id="ticket-count-display">0</span>장</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-md border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <button onclick="changeCalendarMonth(-1)" class="text-gray-400 hover:text-gray-600 font-bold px-2 text-sm">&lt;</button>
                    <span id="calendar-month-title" class="font-extrabold text-gray-700 text-sm"></span>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-bold text-gray-400 mb-2">
                    <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-400">토</div>
                </div>
                <div id="calendar-days-grid" class="grid grid-cols-7 gap-1 text-center text-xs"></div>
                <p class="text-[10px] text-gray-400 mt-3 text-center font-medium">날짜를 누르면 그날의 미션을 미리 확인할 수 있어요!</p>
            </div>
        </div>
    </div>

    <div id="admin-view" class="max-w-4xl mx-auto mt-6 bg-white p-6 rounded-3xl shadow-md border-2 border-dashed border-gray-300 hidden">
        <h2 id="admin-form-title" class="text-lg font-bold text-purple-600 mb-4">🛠️ 부모님 관리자 메뉴 (미션 등록)</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-2xl mb-6 text-sm">
            <div class="sm:col-span-2">
                <label class="block font-bold text-gray-700 mb-1">🏠 메인 화면 타이틀 수정</label>
                <input type="text" id="edit-app-title" placeholder="이준이의 해야 할 일" oninput="updateAppTitle(this.value)" class="w-full p-2.5 border rounded-xl bg-white font-bold">
            </div>
            <div class="sm:col-span-2">
                <label class="block font-bold text-gray-700 mb-1">🎯 미션 이름</label>
                <input type="text" id="new-task-name" placeholder="예: 수학 문제집 2장 풀기" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">📅 시작일</label>
                <input type="date" id="new-task-start" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">📅 종료일</label>
                <input type="date" id="new-task-end" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">💎 완료 포인트</label>
                <input type="number" id="new-task-points" value="10" min="1" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">🎟️ 티켓 교환 기준 포인트</label>
                <input type="number" id="ticket-threshold-setting" value="100" min="10" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div class="sm:col-span-2">
                <label class="block font-bold text-gray-700 mb-2">🗓️ 반복할 요일 선택</label>
                <div class="flex flex-wrap gap-2">
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="
