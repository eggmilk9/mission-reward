<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 나의 리워드 패드</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #F0F4F8; }
        .ticket-bounce { animation: bounce 1s infinite alternate; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .click-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body class="p-4 md:p-8 select-none">

    <!-- 상단 헤더 및 포인트 영역 (그리드 정렬) -->
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <!-- 타이틀 영역 (할 일 리스트 너비에 맞춤) -->
        <div class="md:col-span-2 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
            <div>
                <h1 id="app-title-display" class="text-xl md:text-2xl font-extrabold text-blue-600">이준이의 해야 할 일</h1>
                <p id="current-date" class="text-sm text-gray-500 font-bold mt-1"></p>
            </div>
            <button onclick="toggleMode()" id="mode-btn" class="text-gray-300 hover:text-gray-500 font-bold p-2 text-xl transition bg-transparent border-none outline-none cursor-pointer">
                +
            </button>
        </div>

        <!-- 슬림 포인트 보드 (줄이고 남은 영역에 배치) -->
        <div class="bg-gradient-to-br from-yellow-400 to-orange-400 p-3 px-4 rounded-2xl shadow-sm text-white flex flex-col justify-center">
            <div class="flex justify-between items-center">
                <p class="text-xs font-bold opacity-90">현재 모은 포인트</p>
                <p class="text-[10px] opacity-80"><span id="next-ticket-p">100</span>P 달성 시 소원쿠폰!</p>
            </div>
            <div class="flex items-center gap-3 mt-1.5">
                <div class="flex items-baseline gap-0.5 shrink-0">
                    <span id="current-points" class="text-2xl font-extrabold">0</span>
                    <span class="text-xs font-bold">P</span>
                </div>
                <div class="flex-1 bg-white/20 rounded-full h-2 overflow-hidden">
                    <div id="point-progress" class="bg-white h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- 할 일 목록 -->
        <div id="child-view" class="md:col-span-2 space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-md border border-blue-50">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span>📝 <span id="todo-date-label">오늘</span> 할 일</span>
                        <span id="task-count" class="bg-blue-100 text-blue-600 text-xs py-1 px-2.5 rounded-full font-bold">0개</span>
                    </div>
                    <button id="back-to-today-btn" onclick="goToToday()" class="text-xs bg-blue-500 text-white px-3 py-1.5 rounded-xl font-bold hidden transition hover:bg-blue-600">
                        오늘로 돌아가기 ↩️
                    </button>
                </h2>
                
                <!-- [필수 미션 영역] -->
                <div id="todo-list" class="space-y-3"></div>

                <!-- [선택 미션 영역: 이런 것도 하면 좋아요] -->
                <div id="optional-section" class="mt-6 border-t border-gray-100 pt-4 hidden">
                    <button onclick="toggleOptionalExpand()" class="w-full flex justify-between items-center bg-amber-50 hover:bg-amber-100/70 p-3 rounded-2xl transition-all outline-none">
                        <span class="font-bold text-sm text-amber-700 flex items-center gap-1.5">
                            💡 이런 것도 하면 좋아요 <span id="optional-task-count" class="text-xs bg-amber-200/60 px-2 py-0.5 rounded-full text-amber-800">0개</span>
                        </span>
                        <span id="optional-arrow" class="text-xs text-amber-600 font-bold transition-transform duration-200">펼치기 ▼</span>
                    </button>
                    <div id="optional-todo-list" class="mt-3 space-y-3 hidden"></div>
                </div>
            </div>
        </div>

        <!-- 우측 사이드바 -->
        <div class="space-y-4">
            <!-- 소원쿠폰 보관함 -->
            <div onclick="openTicketBoxModal()" class="click-pulse bg-white p-5 rounded-3xl shadow-md border-2 border-orange-200 text-center cursor-pointer hover:bg-orange-50/50 transition-all active:scale-95">
                <h3 class="text-gray-700 font-bold text-sm mb-3 text-left flex justify-between items-center">
                    <span>🎟️ 소원쿠폰</span>
                    <span class="text-xs text-blue-500 font-bold animate-pulse">열기 🔍</span>
                </h3>
                <div class="flex justify-center items-center gap-4 bg-orange-100/70 p-3 rounded-2xl">
                    <span class="text-4xl">🎫</span>
                    <div class="text-left">
                        <p class="text-xs text-gray-500 font-bold">사용 가능 쿠폰</p>
                        <p class="text-2xl font-extrabold text-orange-500"><span id="ticket-count-display">0</span>장</p>
                    </div>
                </div>
            </div>

            <!-- 먼슬리 캘린더 -->
            <div class="bg-white p-5 rounded-3xl shadow-md border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <button onclick="changeCalendarMonth(-1)" class="text-gray-400 hover:text-gray-600 font-bold px-2 text-sm">&lt;</button>
                    <span id="calendar-month-title" class="font-extrabold text-gray-700 text-sm"></span>
                    <button onclick="changeCalendarMonth(1)" class="text-gray-400 hover:text-gray-600 font-bold px-2 text-sm">&gt;</button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-bold text-gray-400 mb-2">
                    <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-400">토</div>
                </div>
                <div id="calendar-days-grid" class="grid grid-cols-7 gap-1 text-center text-xs"></div>
            </div>

            <!-- 📖 전하고 싶은 말 -->
            <div class="bg-white p-5 rounded-3xl shadow-md border border-gray-100 space-y-3">
                <h3 class="font-extrabold text-gray-700 text-sm flex items-center gap-1.5">
                    <span>📖</span> 전하고 싶은 말
                </h3>
                
                <!-- 내역 출력 영역 -->
                <div id="story-display-area" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
                
                <!-- 쓰기 영역 -->
                <div class="bg-gray-50 p-3 rounded-2xl space-y-2.5 border border-gray-100">
                    <div class="flex gap-1.5">
                        <button id="writer-mom" onclick="selectStoryWriter('mom')" class="px-3 py-1 rounded-xl font-bold text-xs border transition-all bg-white border-gray-200 text-gray-600">
                            엄마
                        </button>
                        <button id="writer-child" onclick="selectStoryWriter('child')" class="px-3 py-1 rounded-xl font-bold text-xs border transition-all bg-white border-gray-200 text-gray-600">
                            준이
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="story-input-text" placeholder="짧은 이야기를 나누어 보세요!" class="flex-1 min-w-0 p-2 text-xs border rounded-xl bg-white outline-none focus:border-blue-400">
                        <button onclick="saveTodayStory()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold px-3 py-2 rounded-xl text-xs transition shrink-0">등록</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 부모님 관리자 메뉴 -->
    <div id="admin-view" class="max-w-4xl mx-auto mt-6 bg-white p-6 rounded-3xl shadow-md border-2 border-dashed border-gray-300 hidden">
        <h2 id="admin-form-title" class="text-lg font-bold text-purple-600 mb-4">🛠️ 부모님 관리자 메뉴 (미션 등록)</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-2xl mb-6 text-sm">
            <div class="sm:col-span-2">
                <label class="block font-bold text-gray-700 mb-1">🏠 메인 화면 타이틀 수정</label>
                <input type="text" id="edit-app-title" placeholder="이준이의 해야 할 일" oninput="updateAppTitle(this.value)" class="w-full p-2.5 border rounded-xl bg-white font-bold">
            </div>
            <div class="sm:col-span-2">
                <label class="block font-bold text-gray-700 mb-1">🎯 미션 이름</label>
                <input type="text" id="new-task-name" placeholder="예: 수학 문제집 2장 풀기" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div class="sm:col-span-2 bg-white p-2.5 rounded-xl border border-gray-200 flex items-center">
                <label class="flex items-center gap-2 font-bold text-amber-700 cursor-pointer select-none w-full">
                    <input type="checkbox" id="new-task-optional" class="w-4 h-4 accent-amber-500">
                    💡 &lt;이런 것도 하면 좋아요&gt; (선택 미션)으로 등록하기
                </label>
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">📅 시작일</label>
                <input type="date" id="new-task-start" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">📅 종료일</label>
                <input type="date" id="new-task-end" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">💎 완료 포인트</label>
                <input type="number" id="new-task-points" value="10" min="1" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div>
                <label class="block font-bold text-gray-700 mb-1">🎟️ 쿠폰 교환 기준 포인트</label>
                <input type="number" id="ticket-threshold-setting" value="100" min="10" class="w-full p-2.5 border rounded-xl bg-white">
            </div>
            <div class="sm:col-span-2">
                <label class="block font-bold text-gray-700 mb-2">🗓️ 반복할 요일 선택</label>
                <div class="flex flex-wrap gap-2">
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="1" checked> 월</label>
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="2" checked> 화</label>
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="3" checked> 수</label>
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="4" checked> 목</label>
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="5" checked> 금</label>
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="6"> 토</label>
                    <label class="flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border cursor-pointer"><input type="checkbox" name="days" value="0"> 일</label>
                </div>
            </div>
            <div class="sm:col-span-2 flex justify-between items-center mt-2">
                <button onclick="resetAllData()" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2.5 px-4 rounded-xl transition text-xs">⚠️ 전체 초기화</button>
                <div class="flex gap-2">
                    <button id="cancel-edit-btn" onclick="cancelEditMode()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 px-4 rounded-xl transition hidden">수정 취소</button>
                    <button id="submit-task-btn" onclick="handleTaskSubmit()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 px-6 rounded-xl transition">➕ 미션 등록하기</button>
                </div>
            </div>
        </div>

        <div>
            <h3 class="font-bold text-gray-700 mb-2">📋 등록된 전체 미션 목록</h3>
            <div id="admin-task-list" class="space-y-2 text-sm"></div>
        </div>
    </div>

    <!-- 🎉 쿠폰 축하 팝업 모달 -->
    <div id="ticket-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-50 hidden p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border-4 border-yellow-400 relative overflow-hidden">
            <span class="text-6xl block mb-2">🎉</span>
            <h2 class="text-2xl font-extrabold text-gray-800">짜잔! 소원쿠폰 획득!</h2>
            <p class="text-sm text-gray-500 font-bold mt-1">목표 포인트를 달성했어요!</p>
            <div class="ticket-bounce my-6 bg-gradient-to-r from-orange-400 to-yellow-400 text-white p-4 rounded-xl shadow-md border-2 border-dashed border-white inline-block w-full">
                <p class="text-xs uppercase tracking-widest opacity-80 font-bold">WISH COUPON</p>
                <p class="text-xl font-black my-1">✨ 소원 쿠폰 ✨</p>
            </div>
            <button onclick="closeModal()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl transition">쿠폰함에 넣기 🚀</button>
        </div>
    </div>

    <!-- 🎫 소원쿠폰함 상세보기 모달 -->
    <div id="ticket-box-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-50 hidden p-4">
        <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-md w-full border-2 border-orange-300 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                <div>
                    <h2 class="text-xl font-black text-gray-800">🎟️ 소원쿠폰함</h2>
                    <p class="text-xs text-gray-400 mt-0.5 font-bold">사용 가능한 소원이 <span id="modal-ticket-count" class="text-orange-500 font-extrabold">0</span>장 있어요!</p>
                </div>
                <button onclick="closeTicketBoxModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold px-2">✕</button>
            </div>
            <div id="modal-ticket-list" class="flex-1 overflow-y-auto my-4 space-y-4 pr-1 max-h-[55vh]"></div>
            <div class="pt-2">
                <button onclick="closeTicketBoxModal()" class="w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition shadow-md">
                    확인하고 돌아가기 👍
                </button>
            </div>
        </div>
    </div>

    <script>
        function getLocalTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        let state = { tasks: [], points: 0, ticketList: [], ticketThreshold: 100, completedLog: {}, appTitle: "이준이의 해야 할 일", stories: {} };
        let viewDateStr = getLocalTodayStr(); 
        let isAdminMode = false;
        let editingTaskId = null; 
        let selectedWriter = 'mom'; 
        let isOptionalExpanded = false; 

        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth();

        window.onload = function() {
            try {
                const saved = localStorage.getItem('child_reward_pad');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed && typeof parsed === 'object') {
                        if (parsed.tasks && Array.isArray(parsed.tasks)) state.tasks = parsed.tasks;
                        if (typeof parsed.points === 'number') state.points = parsed.points;
                        if (parsed.ticketList && Array.isArray(parsed.ticketList)) {
                            state.ticketList = parsed.ticketList.map(t => {
                                if (t && typeof t === 'object') {
                                    if (t.isUsed === undefined) t.isUsed = false;
                                    return t;
                                }
                                return { id: Date.now() + Math.random(), name: String(t || '소원 쿠폰'), isUsed: false };
                            });
                        }
                        if (typeof parsed.ticketThreshold === 'number') state.ticketThreshold = parsed.ticketThreshold;
                        if (parsed.completedLog && typeof parsed.completedLog === 'object') state.completedLog = parsed.completedLog;
                        if (parsed.appTitle && typeof parsed.appTitle === 'string') state.appTitle = parsed.appTitle;
                        if (parsed.stories && typeof parsed.stories === 'object') state.stories = parsed.stories;
                    }
                }
            } catch (e) {
                console.error("데이터 로드 오류", e);
            }
            
            viewDateStr = getLocalTodayStr(); 
            const d = new Date();
            calYear = d.getFullYear();
            calMonth = d.getMonth();

            const inputStart = document.getElementById('new-task-start'); if(inputStart) inputStart.value = viewDateStr;
            const inputEnd = document.getElementById('new-task-end'); if(inputEnd) inputEnd.value = "2026-12-31";
            
            selectStoryWriter('mom');
            displayDate();
            render();
        };

        function saveState() { localStorage.setItem('child_reward_pad', JSON.stringify(state)); }
        
        function displayDate() {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const d = new Date();
            const dateEl = document.getElementById('current-date');
            if(dateEl) dateEl.innerText = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}요일)`;
        }

        function updateAppTitle(val) {
            state.appTitle = val.trim() || "이준이의 해야 할 일";
            const titleDisp = document.getElementById('app-title-display');
            if(titleDisp) titleDisp.innerText = state.appTitle;
            saveState();
        }

        function toggleMode() {
            isAdminMode = !isAdminMode;
            const adminView = document.getElementById('admin-view');
            const modeBtn = document.getElementById('mode-btn');
            if (isAdminMode) {
                if(adminView) adminView.classList.remove('hidden');
                if(modeBtn) modeBtn.innerText = "✕"; 
                const inputTitle = document.getElementById('edit-app-title');
                if(inputTitle) inputTitle.value = state.appTitle;
            } else {
                if(adminView) adminView.classList.add('hidden');
                if(modeBtn) modeBtn.innerText = "+";
                cancelEditMode();
                saveState();
                render();
            }
        }

        function toggleOptionalExpand() {
            isOptionalExpanded = !isOptionalExpanded;
            const listDiv = document.getElementById('optional-todo-list');
            const arrowEl = document.getElementById('optional-arrow');
            if(listDiv && arrowEl) {
                if(isOptionalExpanded) {
                    listDiv.classList.remove('hidden');
                    arrowEl.innerText = "접기 ▲";
                } else {
                    listDiv.classList.add('hidden');
                    arrowEl.innerText = "펼치기 ▼";
                }
            }
        }

        function render() {
            try {
                const todayStr = getLocalTodayStr(); 
                if (!state.stories) state.stories = {};
                if (!state.ticketList) state.ticketList = [];

                const titleDisp = document.getElementById('app-title-display');
                if(titleDisp) titleDisp.innerText = state.appTitle || "이준이의 해야 할 일";

                const todoDateLabel = document.getElementById('todo-date-label');
                const backBtn = document.getElementById('back-to-today-btn');

                if(viewDateStr === todayStr) {
                    if(todoDateLabel) todoDateLabel.innerText = "오늘";
                    if(backBtn) backBtn.classList.add('hidden');
                } else {
                    const md = viewDateStr.split('-');
                    if(md.length >= 3) {
                        const txt = `${parseInt(md[1])}월 ${parseInt(md[2])}일`;
                        if(todoDateLabel) todoDateLabel.innerText = txt;
                    }
                    if(backBtn) backBtn.classList.remove('hidden');
                }

                const targetDate = new Date(viewDateStr.replace(/-/g, '/')); 
                const currentDayOfWeek = isNaN(targetDate.getDay()) ? new Date().getDay() : targetDate.getDay();

                const todaysTasks = state.tasks.filter(t => t && t.startDate <= viewDateStr && t.endDate >= viewDateStr && Array.isArray(t.days) && t.days.includes(currentDayOfWeek));
                
                const mandatoryTasks = todaysTasks.filter(t => !t.isOptional);
                const optionalTasks = todaysTasks.filter(t => t.isOptional);

                const taskCount = document.getElementById('task-count');
                if(taskCount) taskCount.innerText = `필수 ${mandatoryTasks.length}개`;

                if (!state.completedLog[viewDateStr]) state.completedLog[viewDateStr] = [];
                const doneList = state.completedLog[viewDateStr];

                // 1. 필수 미션 목록
                const todoListDiv = document.getElementById('todo-list');
                if(todoListDiv) {
                    todoListDiv.innerHTML = "";
                    if (mandatoryTasks.length === 0) {
                        todoListDiv.innerHTML = `<p class="text-center py-6 text-green-500 font-extrabold text-base">🎉 선택된 날짜에 필수 미션이 없습니다.</p>`;
                    } else {
                        const unfinishedMandatory = mandatoryTasks.filter(t => !doneList.includes(t.id));
                        if(unfinishedMandatory.length === 0) {
                            todoListDiv.innerHTML = `<div class="bg-green-50 p-4 rounded-2xl border border-green-200 text-center font-extrabold text-green-600 mb-2">🎉 짝짝짝! 오늘 꼭 해야 할 일 완료! 👍</div>`;
                        }

                        mandatoryTasks.forEach(task => {
                            const isChecked = doneList.includes(task.id);
                            const item = document.createElement('div');
                            item.className = `flex items-center justify-between p-4 rounded-2xl border transition-all cursor-pointer ${isChecked ? 'bg-green-50 border-green-200 opacity-60' : 'bg-gray-50 border-gray-100 hover:border-blue-200'}`;
                            item.onclick = () => toggleTask(task.id, task.points);
                            item.innerHTML = `
                                <div class="flex items-center gap-3">
                                    <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center font-bold text-sm ${isChecked ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 text-transparent bg-white'}">✓</div>
                                    <span class="font-bold text-base ${isChecked ? 'line-through text-gray-400' : 'text-gray-700'}">${task.name || ''}</span>
                                </div>
                                <span class="bg-yellow-100 text-yellow-700 font-extrabold text-xs py-1 px-2.5 rounded-lg">+${task.points || 0}P</span>
                            `;
                            todoListDiv.appendChild(item);
                        });
                    }
                }

                // 2. 선택 미션 목록
                const optionalSection = document.getElementById('optional-section');
                const optionalTodoGrid = document.getElementById('optional-todo-list');
                const optionalCountLabel = document.getElementById('optional-task-count');

                if(optionalSection && optionalTodoGrid && optionalCountLabel) {
                    if(optionalTasks.length > 0) {
                        optionalSection.classList.remove('hidden');
                        optionalCountLabel.innerText = `${optionalTasks.length}개`;
                        optionalTodoGrid.innerHTML = "";

                        optionalTasks.forEach(task => {
                            const isChecked = doneList.includes(task.id);
                            const item = document.createElement('div');
                            item.className = `flex items-center justify-between p-3.5 rounded-xl border transition-all cursor-pointer ${isChecked ? 'bg-amber-50 border-amber-200 opacity-60' : 'bg-orange-50/40 border-orange-100/60 hover:border-amber-200'}`;
                            item.onclick = () => toggleTask(task.id, task.points);
                            item.innerHTML = `
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center font-bold text-xs ${isChecked ? 'bg-amber-500 border-amber-500 text-white' : 'border-amber-300 text-transparent bg-white'}">✓</div>
                                    <span class="font-bold text-sm ${isChecked ? 'line-through text-gray-400' : 'text-amber-900'}">${task.name || ''}</span>
                                </div>
                                <span class="bg-amber-100 text-amber-800 font-extrabold text-[11px] py-0.5 px-2 rounded-lg">+${task.points || 0}P</span>
                            `;
                            optionalTodoGrid.appendChild(item);
                        });
                        
                        if(isOptionalExpanded) {
                            optionalTodoGrid.classList.remove('hidden');
                            document.getElementById('optional-arrow').innerText = "접기 ▲";
                        } else {
                            optionalTodoGrid.classList.add('hidden');
                            document.getElementById('optional-arrow').innerText = "펼치기 ▼";
                        }
                    } else {
                        optionalSection.classList.add('hidden');
                    }
                }

                const currPoints = document.getElementById('current-points'); if(currPoints) currPoints.innerText = state.points || 0;
                
                const unusedTicketsCount = state.ticketList.filter(t => !t.isUsed).length;
                const ticketCountDisp = document.getElementById('ticket-count-display'); if(ticketCountDisp) ticketCountDisp.innerText = unusedTicketsCount;
                
                const nextTicketP = document.getElementById('next-ticket-p'); if(nextTicketP) nextTicketP.innerText = state.ticketThreshold || 100;
                
                const pointProgress = document.getElementById('point-progress');
                if(pointProgress) {
                    const threshold = state.ticketThreshold || 100;
                    pointProgress.style.width = `${Math.min(((state.points || 0) / threshold) * 100, 100)}%`;
                }

                const adminListDiv = document.getElementById('admin-task-list');
                if(adminListDiv) {
                    adminListDiv.innerHTML = "";
                    state.tasks.forEach(t => {
                        if(!t) return;
                        const dayNames = ['일','월','화','수','목','금','토'];
                        const tDays = Array.isArray(t.days) ? t.days.map(idx => dayNames[idx]).join(', ') : '';
                        const row = document.createElement('div');
                        row.className = `flex justify-between items-center p-3 rounded-xl border ${editingTaskId === t.id ? 'bg-purple-50 border-purple-300 animate-pulse' : 'bg-gray-50 border-gray-200'}`;
                        row.innerHTML = `
                            <div>
                                <p class="font-bold text-gray-800">${t.isOptional ? '💡 [선택] ' : '🎯 [필수] '} ${t.name || ''} <span class="text-purple-600">(${t.points || 0}P)</span></p>
                                <p class="text-xs text-gray-400">📅 ${t.startDate || ''} ~ ${t.endDate || ''} | 🔁 [${tDays}]</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="startEditTask(${t.id})" class="text-blue-500 hover:text-blue-700 font-bold px-2.5 py-1.5 bg-blue-50 rounded-xl transition text-xs">수정</button>
                                <button onclick="deleteTask(${t.id})" class="text-red-500 hover:text-red-700 font-bold px-2.5 py-1.5 bg-red-50 rounded-xl transition text-xs">삭제</button>
                            </div>
                        `;
                        adminListDiv.appendChild(row);
                    });
                }

                renderCalendarGrid();
                renderTodayStories();
            } catch (err) { console.error(err); }
        }

        function renderTodayStories() {
            const displayArea = document.getElementById('story-display-area');
            if(!displayArea) return;
            displayArea.innerHTML = "";

            const dayStories = state.stories[viewDateStr] || [];

            if(dayStories.length === 0) {
                displayArea.innerHTML = `<p class="text-center py-4 text-gray-400 text-xs font-bold">아직 전하고 싶은 말이 없어요 💬</p>`;
                return;
            }

            dayStories.forEach((st, index) => {
                const bubble = document.createElement('div');
                const isMom = st.writer === 'mom';
                bubble.className = `flex gap-2 items-start text-xs p-2.5 rounded-2xl border relative group ${isMom ? 'bg-purple-50/60 border-purple-100' : 'bg-blue-50/60 border-blue-100'}`;
                
                bubble.innerHTML = `
                    <span class="text-sm shrink-0">${isMom ? '👩' : '👦'}</span>
                    <div class="flex-1">
                        <p class="font-extrabold text-[10px] ${isMom ? 'text-purple-600' : 'text-blue-600'}">${isMom ? '엄마' : '준이'}</p>
                        <p class="text-gray-700 font-medium mt-0.5 whitespace-pre-wrap">${st.text}</p>
                    </div>
                    <button onclick="deleteStory(${index})" class="text-[10px] text-gray-300 hover:text-red-500 font-bold px-1 transition">✕</button>
                `;
                displayArea.appendChild(bubble);
            });
            displayArea.scrollTop = displayArea.scrollHeight;
        }

        function selectStoryWriter(writer) {
            selectedWriter = writer;
            const momBtn = document.getElementById('writer-mom');
            const childBtn = document.getElementById('writer-child');
            if(!momBtn || !childBtn) return;

            if(writer === 'mom') {
                momBtn.className = "px-3 py-1 rounded-xl font-bold text-xs border transition-all bg-purple-500 border-purple-500 text-white shadow-sm";
                childBtn.className = "px-3 py-1 rounded-xl font-bold text-xs border transition-all bg-white border-gray-200 text-gray-600";
            } else {
                momBtn.className = "px-3 py-1 rounded-xl font-bold text-xs border transition-all bg-white border-gray-200 text-gray-600";
                childBtn.className = "px-3 py-1 rounded-xl font-bold text-xs border transition-all bg-blue-500 border-blue-500 text-white shadow-sm";
            }
        }

        function saveTodayStory() {
            const inputEl = document.getElementById('story-input-text');
            if(!inputEl) return;
            const text = inputEl.value.trim();
            if(!text) { alert("내용을 입력해 주세요!"); return; }

            if(!state.stories[viewDateStr]) state.stories[viewDateStr] = [];
            state.stories[viewDateStr].push({ writer: selectedWriter, text: text });
            
            inputEl.value = "";
            saveState();
            renderTodayStories();
        }

        function deleteStory(index) {
            if(confirm("이 내용을 삭제할까요?")) {
                if(state.stories[viewDateStr]) {
                    state.stories[viewDateStr].splice(index, 1);
                    if(state.stories[viewDateStr].length === 0) delete state.stories[viewDateStr];
                    saveState();
                    renderTodayStories();
                }
            }
        }

        function renderCalendarGrid() {
            try {
                const todayStr = getLocalTodayStr();
                const monthLabels = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                
                const monthTitle = document.getElementById('calendar-month-title');
                if(monthTitle) monthTitle.innerText = `${calYear}년 ${monthLabels[calMonth]}`;
                
                const gridContainer = document.getElementById('calendar-days-grid');
                if (!gridContainer) return;
                gridContainer.innerHTML = "";

                const firstDayIndex = new Date(calYear, calMonth, 1).getDay();
                const totalDays = new Date(calYear, calMonth + 1, 0).getDate();

                for (let i = 0; i < firstDayIndex; i++) {
                    gridContainer.appendChild(document.createElement('div'));
                }

                for (let day = 1; day <= totalDays; day++) {
                    const cellDateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const cell = document.createElement('div');
                    
                    cell.innerText = day;
                    cell.className = `p-1.5 rounded-lg font-bold cursor-pointer transition-all active:scale-95 text-center `;

                    if (cellDateStr === todayStr) { cell.className += "border-2 border-blue-500 text-blue-600 "; }
                    if (cellDateStr === viewDateStr) {
                        cell.className += "bg-blue-500 text-white shadow-sm "; 
                    } else if (cellDateStr !== todayStr) {
                        cell.className += "text-gray-700 hover:bg-gray-100 "; 
                    }

                    cell.onclick = () => {
                        viewDateStr = cellDateStr;
                        render();
                    };
                    gridContainer.appendChild(cell);
                }
            } catch (e) { console.error(e); }
        }

        function changeCalendarMonth(offset) {
            calMonth += offset;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendarGrid();
        }

        function goToToday() {
            viewDateStr = getLocalTodayStr();
            const d = new Date();
            calYear = d.getFullYear();
            calMonth = d.getMonth();
            render();
        }

        function toggleTask(taskId, points) {
            if (!state.completedLog[viewDateStr]) state.completedLog[viewDateStr] = [];
            const index = state.completedLog[viewDateStr].indexOf(taskId);
            
            if (index > -1) {
                state.completedLog[viewDateStr].splice(index, 1);
                state.points -= points;
                
                while (state.points < 0 && state.ticketList.filter(t => !t.isUsed).length > 0) {
                    const unusedIndices = state.ticketList.map((t, i) => !t.isUsed ? i : -1).filter(i => i !== -1);
                    if (unusedIndices.length > 0) {
                        const lastUnusedIdx = unusedIndices[unusedIndices.length - 1];
                        state.ticketList.splice(lastUnusedIdx, 1);
                    }
                    state.points += state.ticketThreshold;
                }
                if (state.points < 0) state.points = 0;
            } else {
                state.completedLog[viewDateStr].push(taskId);
                state.points += points;
                while (state.points >= state.ticketThreshold) {
                    state.points -= state.ticketThreshold;
                    state.ticketList.push({ id: Date.now() + Math.random(), name: "✨ 터치해서 소원을 적으세요!", isUsed: false });
                    showTicketModal();
                }
            }
            saveState();
            render();
        }

        function startEditTask(id) {
            const task = state.tasks.find(t => t && t.id === id);
            if(!task) return;

            editingTaskId = id;
            
            const formTitle = document.getElementById('admin-form-title'); if(formTitle) formTitle.innerText = "📝 부모님 관리자 메뉴 (미션 데이터 수정 중)";
            const inputName = document.getElementById('new-task-name'); if(inputName) inputName.value = task.name || '';
            const inputStart = document.getElementById('new-task-start'); if(inputStart) inputStart.value = task.startDate || '';
            const inputEnd = document.getElementById('new-task-end'); if(inputEnd) inputEnd.value = task.endDate || '';
            const inputPoints = document.getElementById('new-task-points'); if(inputPoints) inputPoints.value = task.points || 10;
            const inputOptional = document.getElementById('new-task-optional'); if(inputOptional) inputOptional.checked = !!task.isOptional;

            const checkboxes = document.querySelectorAll('input[name="days"]');
            checkboxes.forEach(cb => {
                if(task.days && Array.isArray(task.days)) cb.checked = task.days.includes(parseInt(cb.value));
            });

            const submitBtn = document.getElementById('submit-task-btn'); if(submitBtn) submitBtn.innerText = "✏️ 미션 수정 완료";
            const cancelBtn = document.getElementById('cancel-edit-btn'); if(cancelBtn) cancelBtn.classList.add('hidden');
            if(formTitle) formTitle.scrollIntoView({ behavior: 'smooth' });
            render();
        }

        function cancelEditMode() {
            editingTaskId = null;
            const formTitle = document.getElementById('admin-form-title'); if(formTitle) formTitle.innerText = "🛠️ 부모님 관리자 메뉴 (미션 등록)";
            const inputName = document.getElementById('new-task-name'); if(inputName) inputName.value = "";
            const inputStart = document.getElementById('new-task-start'); if(inputStart) inputStart.value = getLocalTodayStr();
            const inputEnd = document.getElementById('new-task-end'); if(inputEnd) inputEnd.value = "2026-12-31";
            const inputPoints = document.getElementById('new-task-points'); if(inputPoints) inputPoints.value = "10";
            const inputOptional = document.getElementById('new-task-optional'); if(inputOptional) inputOptional.checked = false;
            
            const submitBtn = document.getElementById('submit-task-btn'); if(submitBtn) submitBtn.innerText = "➕ 미션 등록하기";
            const cancelBtn = document.getElementById('cancel-edit-btn'); if(cancelBtn) cancelBtn.classList.add('hidden');
            render();
        }

        function handleTaskSubmit() {
            const nameEl = document.getElementById('new-task-name');
            const startEl = document.getElementById('new-task-start');
            const endEl = document.getElementById('new-task-end');
            const pointsEl = document.getElementById('new-task-points');
            const optionalEl = document.getElementById('new-task-optional');
            
            const name = nameEl ? nameEl.value.trim() : "";
            const startDate = startEl ? startEl.value : getLocalTodayStr();
            const endDate = endEl ? endEl.value : "2026-12-31";
            const points = pointsEl ? (parseInt(pointsEl.value) || 10) : 10;
            const isOptional = optionalEl ? optionalEl.checked : false;
            const checkedDays = Array.from(document.querySelectorAll('input[name="days"]:checked')).map(el => parseInt(el.value));

            if (!name) { alert("미션 이름을 입력해주세요!"); return; }
            if (checkedDays.length === 0) { alert("요일을 선택해주세요!"); return; }

            if(editingTaskId !== null) {
                const taskIndex = state.tasks.findIndex(t => t && t.id === editingTaskId);
                if(taskIndex > -1) {
                    state.tasks[taskIndex] = { ...state.tasks[taskIndex], name, startDate, endDate, points, isOptional, days: checkedDays };
                    alert("미션 수정이 완료되었습니다!");
                }
                cancelEditMode();
            } else {
                state.tasks.push({ id: Date.now(), name, startDate, endDate, points, isOptional, days: checkedDays });
                if(nameEl) nameEl.value = "";
                if(optionalEl) optionalEl.checked = false;
                alert("새로운 미션이 정상적으로 등록되었습니다!");
                render();
            }
            saveState();
        }

        function deleteTask(id) {
            if(confirm("이 미션을 정말 삭제할까요?")) {
                if(editingTaskId === id) cancelEditMode();
                state.tasks = state.tasks.filter(t => t && t.id !== id);
                saveState();
                render();
            }
        }

        function openTicketBoxModal() {
            const unusedCount = state.ticketList.filter(t => !t.isUsed).length;
            const usedCount = state.ticketList.filter(t => t.isUsed).length;

            const modalCount = document.getElementById('modal-ticket-count'); if(modalCount) modalCount.innerText = unusedCount;
            const container = document.getElementById('modal-ticket-list');
            if (!container) return;
            container.innerHTML = "";

            if(state.ticketList.length === 0) {
                container.innerHTML = `<p class="text-center py-12 text-gray-400 font-bold text-sm">아직 소원 쿠폰이 없어요! 😭<br>미션을 완료해서 포인트를 모아보세요!</p>`;
                const boxModal = document.getElementById('ticket-box-modal'); if(boxModal) boxModal.classList.remove('hidden');
                return;
            }

            const availableSection = document.createElement('div');
            availableSection.className = "space-y-3";
            availableSection.innerHTML = `<h3 class="font-extrabold text-xs text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl flex justify-between items-center"><span>🟢 사용 가능한 쿠폰</span> <span>${unusedCount}장</span></h3>`;
            
            const usedSection = document.createElement('div');
            usedSection.className = "space-y-3 mt-6 pt-4 border-t border-gray-100";
            usedSection.innerHTML = `<h3 class="font-extrabold text-xs text-gray-400 bg-gray-50 px-3 py-1.5 rounded-xl flex justify-between items-center"><span>⚪ 사용 완료한 쿠폰</span> <span>${usedCount}장</span></h3>`;

            let hasUnused = false;
            let hasUsed = false;

            state.ticketList.forEach((ticket, idx) => {
                if(!ticket) return;

                const card = document.createElement('div');
                if(!ticket.isUsed) {
                    hasUnused = true;
                    card.className = "bg-gradient-to-r from-orange-400 to-amber-400 p-4 rounded-2xl shadow-sm text-white border-2 border-dashed border-white/60 relative space-y-2";
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-xs uppercase font-black tracking-widest bg-white/20 px-2 py-0.5 rounded-md">쿠폰 #${idx + 1}</span>
                            <button onclick="useTicket(${ticket.id})" class="bg-white text-orange-600 font-extrabold px-3 py-1 rounded-xl text-xs hover:bg-orange-50 transition shadow-sm active:scale-95">
                                ✔ 사용 완료
                            </button>
                        </div>
                        <div class="mt-1">
                            <label class="block text-[10px] text-white/80 font-bold mb-1">✍️ 이 쿠폰의 소원을 입력하세요:</label>
                            <input type="text" value="${ticket.name || ''}" 
                                onchange="updateTicketName(${ticket.id}, this.value)"
                                placeholder="예: 게임시간 30분 연장, 원하는 책 구매" 
                                class="w-full p-2 rounded-xl border-none bg-white text-gray-800 font-bold text-sm focus:ring-2 focus:ring-amber-300 outline-none">
                        </div>
                    `;
                    availableSection.appendChild(card);
                } else {
                    hasUsed = true;
                    card.className = "bg-gray-50 p-3.5 rounded-2xl text-gray-400 border border-gray-200 relative opacity-70 flex justify-between items-center gap-3";
                    card.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <span class="text-[10px] uppercase font-bold bg-gray-200 px-1.5 py-0.5 rounded text-gray-500">쿠폰 #${idx + 1} 완료</span>
                            <p class="font-bold text-sm text-gray-500 line-through truncate mt-1">${ticket.name || ''}</p>
                        </div>
                        <button onclick="restoreTicket(${ticket.id})" class="text-[11px] text-gray-400 hover:text-blue-500 font-bold transition shrink-0 bg-white border border-gray-200 px-2 py-1 rounded-lg">
                            되돌리기 ↩
                        </button>
                    `;
                    usedSection.appendChild(card);
                }
            });

            if(!hasUnused) {
                availableSection.innerHTML += `<p class="text-center py-4 text-gray-400 text-xs font-bold bg-gray-50/50 rounded-xl border border-dashed border-gray-200">현재 쓸 수 있는 쿠폰이 없습니다 🎫</p>`;
            }
            if(!hasUsed) {
                usedSection.innerHTML += `<p class="text-center py-4 text-gray-400 text-xs font-bold">사용 완료된 내역이 없습니다.</p>`;
            }

            container.appendChild(availableSection);
            container.appendChild(usedSection);

            const boxModal = document.getElementById('ticket-box-modal'); if(boxModal) boxModal.classList.remove('hidden');
        }

        function useTicket(id) {
            const ticket = state.ticketList.find(t => t && t.id === id);
            if(ticket) {
                ticket.isUsed = true;
                saveState();
                openTicketBoxModal(); 
            }
        }

        function restoreTicket(id) {
            const ticket = state.ticketList.find(t => t && t.id === id);
            if(ticket) {
                ticket.isUsed = false;
                saveState();
                openTicketBoxModal(); 
            }
        }

        function closeTicketBoxModal() {
            const boxModal = document.getElementById('ticket-box-modal'); if(boxModal) boxModal.classList.add('hidden');
            render();
        }

        function updateTicketName(id, newName) {
            const ticket = state.ticketList.find(t => t && t.id === id);
            if(ticket) {
                ticket.name = newName.trim() || "✨ 터치해서 소원을 적으세요!";
                saveState();
            }
        }

        function resetAllData() {
            if(confirm("⚠️ 모은 포인트, 쿠폰, 모든 미션과 내용이 전부 완전히 초기화됩니다! 그래도 할까요?")) {
                localStorage.removeItem('child_reward_pad');
                state = { tasks: [], points: 0, ticketList: [], ticketThreshold: 100, completedLog: {}, appTitle: "이준이의 해야 할 일", stories: {} };
                cancelEditMode();
                saveState();
                render();
                alert("초기화 완료!");
            }
        }

        function showTicketModal() { const modal = document.getElementById('ticket-modal'); if(modal) modal.classList.remove('hidden'); }
        function closeModal() { const modal = document.getElementById('ticket-modal'); if(modal) modal.classList.add('hidden'); }
    </script>
</body>
</html>
